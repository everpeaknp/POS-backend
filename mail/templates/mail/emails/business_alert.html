{% extends "mail/emails/base.html" %}
{% block content %}
<h2 style="margin:0 0 12px;font-size:18px;color:#111827;">{{ alert_subject }}</h2>
<p style="margin:0 0 16px;color:#374151;line-height:1.6;">{{ alert_message }}</p>
{% if action_url %}
<p style="margin:24px 0 0;">
  <a href="{{ action_url }}" style="display:inline-block;background:#22C55E;color:#fff;text-decoration:none;padding:10px 18px;border-radius:8px;font-weight:600;">
    {{ action_label|default:"View in Khata" }}
  </a>
</p>
{% endif %}
{% endblock %}
